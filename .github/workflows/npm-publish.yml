name: MERN Deploy (Auto Setup Amazon Linux)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: 🚀 Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🔧 Updating system"
          sudo yum update -y

          echo "📦 Installing Git"
          sudo yum install git -y

          echo "📦 Installing Node.js"
          curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
          sudo yum install -y nodejs

          echo "📦 Installing PM2"
          sudo npm install -g pm2

          echo "📦 Installing Nginx"
          sudo yum install nginx -y || sudo amazon-linux-extras install nginx1 -y
          sudo systemctl start nginx
          sudo systemctl enable nginx

          echo "📂 Setup App Directory"
          mkdir -p ~/app
          cd ~/app

          if [ ! -d ".git" ]; then
            git clone https://github.com/${{ github.repository }} .
          else
            git pull origin master
          fi

          echo "📦 Backend setup"
          cd backend
          npm install

          echo "🚀 Start backend"

          if [ -f server.js ]; then
            FILE=server.js
          elif [ -f app.js ]; then
            FILE=app.js
          elif [ -f index.js ]; then
            FILE=index.js
          else
            echo "❌ No backend entry file found"
            exit 1
          fi

          pm2 delete backend || true
          pm2 start $FILE --name backend

          echo "📦 Frontend setup"
          cd ../frontend
          npm install
          npm run build

          echo "🌐 Configure Nginx"

          sudo rm -f /etc/nginx/conf.d/app.conf

          echo 'server {' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '    listen 80;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '    server_name _;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '    location / {' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '        root /usr/share/nginx/html;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '        index index.html;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '        try_files $uri /index.html;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '    }' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '    location /api/ {' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '        proxy_pass http://localhost:5001/;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '        proxy_http_version 1.1;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '        proxy_set_header Upgrade $http_upgrade;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '        proxy_set_header Connection "upgrade";' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '        proxy_set_header Host $host;' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '    }' | sudo tee -a /etc/nginx/conf.d/app.conf
          echo '}' | sudo tee -a /etc/nginx/conf.d/app.conf

          echo "🌐 Deploy frontend"
          sudo rm -rf /usr/share/nginx/html/*
          sudo cp -r build/* /usr/share/nginx/html/

          echo "🔄 Restart services"
          sudo systemctl restart nginx
          pm2 save

          echo "✅ Deployment successful"

          EOF
