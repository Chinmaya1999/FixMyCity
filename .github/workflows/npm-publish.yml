name: MERN Deploy (Auto Setup Amazon Linux)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: 🚀 Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🔧 Updating system"
          sudo yum update -y

          echo "📦 Installing Git"
          sudo yum install git -y

          echo "📦 Installing Node.js"
          curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
          sudo yum install -y nodejs

          echo "📦 Installing PM2"
          sudo npm install -g pm2

          echo "📦 Installing Nginx"
          sudo yum install nginx -y || sudo amazon-linux-extras install nginx1 -y
          sudo systemctl start nginx
          sudo systemctl enable nginx

          echo "📂 Setup App Directory"
          mkdir -p ~/app
          cd ~/app

          if [ ! -d ".git" ]; then
            echo "📥 Cloning repo"
            git clone https://github.com/${{ github.repository }} .
          else
            echo "🔄 Pull latest code"
            git pull origin master
          fi

          echo "📦 Backend setup"
          cd backend
          npm install

          echo "🚀 Start backend"

          # Auto detect backend entry file
          if [ -f server.js ]; then
            FILE=server.js
          elif [ -f app.js ]; then
            FILE=app.js
          elif [ -f index.js ]; then
            FILE=index.js
          else
            echo "❌ No backend entry file found"
            exit 1
          fi

          pm2 delete backend || true
          pm2 start $FILE --name backend

          echo "📦 Frontend setup"
          cd ../frontend
          npm install
          npm run build

          echo "🌐 Configure Nginx"
          sudo bash -c 'cat > /etc/nginx/conf.d/app.conf <<EOL
          server {
              listen 80;
              server_name _;

              location / {
                  root /usr/share/nginx/html;
                  index index.html;
                  try_files \$uri /index.html;
              }

              location /api/ {
                  proxy_pass http://localhost:5001/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
              }
          }
EOL'

          echo "🌐 Deploy frontend"
          sudo rm -rf /usr/share/nginx/html/*
          sudo cp -r build/* /usr/share/nginx/html/

          echo "🔄 Restart services"
          sudo systemctl restart nginx
          pm2 save

          echo "✅ Deployment successful"

          EOF
