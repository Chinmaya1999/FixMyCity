name: MERN Deploy (Auto Setup Amazon Linux)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: 🚀 Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🔧 Updating system"
          sudo yum update -y

          echo "📦 Installing Git"
          sudo yum install git -y

          echo "📦 Installing Node.js"
          curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
          sudo yum install -y nodejs

          echo "📦 Installing PM2"
          sudo npm install -g pm2

          echo "📦 Installing Nginx"
          sudo yum install nginx -y || sudo amazon-linux-extras install nginx1 -y

          echo "📂 Setup App Directory"
          mkdir -p ~/app
          cd ~/app

          if [ ! -d ".git" ]; then
            git clone https://github.com/${{ github.repository }} .
          else
            git pull origin master
          fi

          echo "📦 Backend setup"
          cd backend
          npm install

          # Install cors if not already installed
          if ! grep -q "cors" package.json; then
            npm install cors
          fi

          echo "🚀 Start backend"
          if [ -f server.js ]; then
            FILE=server.js
          elif [ -f app.js ]; then
            FILE=app.js
          elif [ -f index.js ]; then
            FILE=index.js
          else
            echo "❌ No backend entry file found"
            exit 1
          fi

          # Stop existing process if any
          pm2 delete backend || true
          
          # Start backend with proper environment
          PORT=5001 pm2 start $FILE --name backend -- --port 5001
          pm2 save
          pm2 startup

          echo "📦 Frontend setup"
          cd ../frontend
          
          # Create .env.production for React
          echo "REACT_APP_API_URL=/api" > .env.production
          
          # Replace any hardcoded localhost URLs in the source
          find ./src -type f -name "*.js" -exec sed -i 's|http://localhost:5001||g' {} \;
          find ./src -type f -name "*.jsx" -exec sed -i 's|http://localhost:5001||g' {} \;
          
          npm install
          npm run build

          echo "🌐 Configure Nginx"
          
          # Remove default nginx config
          sudo rm -f /etc/nginx/conf.d/app.conf
          sudo rm -f /etc/nginx/sites-enabled/default

          # Create new nginx configuration
          sudo tee /etc/nginx/conf.d/app.conf > /dev/null << 'NGINX_CONF'
server {
    listen 80;
    server_name _;
    
    # Root for static files
    root /usr/share/nginx/html;
    index index.html;

    # Handle frontend routes
    location / {
        try_files $uri $uri/ /index.html;
        
        # Add CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
    }

    # Proxy API requests to backend
    location /api/ {
        # Remove /api prefix when forwarding to backend
        rewrite ^/api/(.*) /$1 break;
        
        # Proxy to backend
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # CORS headers for API
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }
    
    # Optional: Direct backend access (if you want to keep it)
    location /backend/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
NGINX_CONF

          echo "🌐 Deploy frontend"
          sudo rm -rf /usr/share/nginx/html/*
          sudo cp -r build/* /usr/share/nginx/html/

          echo "🔧 Test Nginx configuration"
          sudo nginx -t

          echo "🔄 Restart services"
          sudo systemctl restart nginx
          sudo systemctl enable nginx

          echo "✅ Deployment successful"
          echo "🌎 Frontend: http://${{ secrets.EC2_HOST }}"
          echo "🌎 Backend API: http://${{ secrets.EC2_HOST }}/api/auth/login"
          echo "🌎 Direct Backend: http://${{ secrets.EC2_HOST }}:5001/api/auth/login"

          EOF
